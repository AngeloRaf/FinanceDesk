<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceDesk — Connexion</title>
<style>
  @font-face {
    font-family: 'DM Sans';
    src: url('../assets/fonts/DMSans-Regular.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('../assets/fonts/DMSans-Medium.woff2') format('woff2');
    font-weight: 500;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('../assets/fonts/DMSans-SemiBold.woff2') format('woff2');
    font-weight: 600;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', Georgia, serif;
    background: #f4f4f0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e5e0;
    border-radius: 14px;
    padding: 48px 44px 40px;
    width: 400px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: #1a3a6b;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    color: #1a3a6b;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: #7eb3f5; }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #0f0f0e;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13.5px;
    color: #5a5a55;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: #3a3a38;
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d0d0ca;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: #0f0f0e;
    background: #fafaf8;
    outline: none;
    transition: border-color .15s;
    margin-bottom: 20px;
  }

  input[type="password"]:focus {
    border-color: #1a3a6b;
    background: #fff;
  }

  button {
    width: 100%;
    padding: 11px;
    background: #1a3a6b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }

  button:hover { background: #2554a0; }
  button:active { background: #122d56; }

  .erreur {
    display: none;
    background: #fdf1f1;
    border: 1px solid #f0c0c0;
    border-radius: 7px;
    color: #a31b1b;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }

  .erreur.visible { display: block; }

  .version {
    text-align: center;
    font-size: 11.5px;
    color: #9a9a94;
    margin-top: 24px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <div class="logo-icon">FD</div>
    <div class="logo-text">Finance<span>Desk</span></div>
  </div>

  <h1>Accès sécurisé</h1>
  <p class="subtitle">Entrez votre mot de passe maître pour continuer.</p>

  <div class="erreur" id="erreur">Mot de passe incorrect. Veuillez réessayer.</div>

  <label for="mdp">Mot de passe</label>
  <input type="password" id="mdp" placeholder="••••••••"
         autofocus autocomplete="current-password">

  <button onclick="valider()">Déverrouiller</button>

  <div class="version">FinanceDesk v1.1 — SAIM Ltd</div>
</div>

<script>
  document.getElementById('mdp').addEventListener('keydown', e => {
    if (e.key === 'Enter') valider();
  });

  async function valider() {
    const mdp = document.getElementById('mdp').value;
    if (!mdp) return;

    const res  = await window.pywebview.api.verifier_password(mdp);
    const data = JSON.parse(res);

    if (data.ok && data.data.valide) {
      window.location.href = 'FinanceDesk_v1_1.html';
    } else {
      document.getElementById('erreur').classList.add('visible');
      document.getElementById('mdp').value = '';
      document.getElementById('mdp').focus();
    }
  }
</script>
</body>
</html>
